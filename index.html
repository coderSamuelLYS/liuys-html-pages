<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>开发者文档 · liuys</title>
  <meta name="description" content="liuys 的 HTML 文档索引，由 Cloudflare Pages 同步发布。">
  <style>
    :root {
      color-scheme: light;
      --white:#fff; --soft:#f5f5f7; --ink:#1d1d1f; --muted:#6e6e73; --blue:#0066cc;
      --line:#e8e8ed; --line2:#d2d2d7; --shadow:0 1px 2px rgba(0,0,0,.03),0 12px 34px rgba(0,0,0,.045);
      --shadow-hover:0 1px 2px rgba(0,0,0,.04),0 22px 54px rgba(0,0,0,.085);
      --radius:26px; --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth;-webkit-text-size-adjust:100%} body{margin:0;color:var(--ink);font-family:var(--sans);background:var(--white);-webkit-font-smoothing:antialiased;letter-spacing:-.003em} a{color:inherit;text-decoration:none} ::selection{background:rgba(0,102,204,.14)}
    .topbar{position:sticky;top:0;z-index:10;height:56px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.72);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4)}
    .topbar-inner{width:min(1120px,calc(100vw - 40px));height:100%;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:11px;min-width:0} .mark{width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line2);border-radius:9px;background:var(--white);font-weight:650} .brand-text{font-size:14px;white-space:nowrap} .brand-text span{color:var(--muted)}
    .actions{display:flex;gap:7px;align-items:center} .pill{height:32px;padding:0 13px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:var(--white);font:13px/1 var(--sans);cursor:pointer;transition:background .3s ease-in-out,border-color .3s ease-in-out,color .3s ease-in-out} .pill:hover{background:var(--soft);border-color:var(--line2)} .pill svg{width:14px;height:14px}
    .hero{padding:clamp(58px,11vh,112px) 20px clamp(42px,7vh,76px);text-align:center;background:var(--white)} .eyebrow{margin:0 0 18px;color:var(--muted);font-size:12px;font-weight:560;letter-spacing:.16em;text-transform:uppercase} h1{margin:0 auto;max-width:14ch;color:var(--ink);font-size:clamp(42px,7.2vw,82px);line-height:1.04;font-weight:620;letter-spacing:-.032em} .desc{margin:18px auto 0;max-width:48ch;color:var(--muted);font-size:16px;line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .search{width:min(560px,100%);margin:32px auto 0} .search-box{height:52px;display:flex;align-items:center;padding:0 14px 0 18px;border:1px solid var(--line);border-radius:999px;background:rgba(245,245,247,.72);box-shadow:var(--shadow);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);transition:border-color .3s ease-in-out,box-shadow .3s ease-in-out,background .3s ease-in-out} .search-box:focus-within{border-color:rgba(0,102,204,.5);background:rgba(255,255,255,.92);box-shadow:0 0 0 4px rgba(0,102,204,.12),var(--shadow)} .search-box svg{flex:none;color:var(--muted)} #search{flex:1;min-width:0;border:0;outline:0;background:transparent;padding:0 12px;color:var(--ink);font:15px var(--sans)} #search::placeholder{color:var(--muted)} .clear{display:none;width:26px;height:26px;border:0;border-radius:50%;background:var(--soft);color:var(--muted);cursor:pointer} .clear.show{display:inline-grid;place-items:center} .kbd{font:11px var(--mono);color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 6px;background:var(--white)}
    .stats{margin:26px auto 0;display:inline-flex;align-items:center;gap:10px;color:var(--muted);font-size:13px} .stats b{color:var(--ink);font-weight:560} .dot{width:3px;height:3px;border-radius:50%;background:var(--line2)}
    .section{background:var(--soft);padding:clamp(42px,7vw,76px) 20px clamp(60px,9vw,100px)} .wrap{width:min(1120px,calc(100vw - 40px));margin:auto} .head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:24px} .head h2{margin:0;font-size:clamp(22px,3vw,28px);font-weight:610;letter-spacing:-.022em} .head span{color:var(--muted);font-size:13px;white-space:nowrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;align-items:start} .card{position:relative;display:flex;flex-direction:column;padding:24px;border:1px solid var(--line);border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);transition:transform .3s ease-in-out,box-shadow .3s ease-in-out,border-color .3s ease-in-out} .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:var(--line2)} .card.featured{grid-column:span 2;padding:28px;border-radius:30px} .card-head{display:flex;align-items:center;gap:12px;margin-bottom:18px} .icon{width:36px;height:36px;display:grid;place-items:center;flex:none;border:1px solid var(--line);border-radius:11px;background:var(--soft);color:var(--ink)} .title{min-width:0} .title h3{margin:0;color:var(--ink);font-size:17px;font-weight:610;line-height:1.3} .meta{display:block;margin-top:3px;color:var(--muted);font-size:12.5px} .tag{margin-left:auto;flex:none;color:var(--blue);font-size:11px;font-weight:560;border:1px solid rgba(0,102,204,.22);background:rgba(0,102,204,.06);border-radius:999px;padding:3px 9px}
    .docs{list-style:none;margin:0;padding:0;display:flex;flex-direction:column} .doc{border-top:1px solid var(--line)} .doc:first-child{border-top:0} .doc a{display:flex;align-items:center;gap:12px;padding:13px 2px;transition:color .3s ease-in-out} .seq{min-width:30px;color:var(--muted);font:11px var(--mono)} .doc-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14.5px;font-weight:450;line-height:1.4;background-image:linear-gradient(currentColor,currentColor);background-size:0 1px;background-position:0 100%;background-repeat:no-repeat;transition:background-size .3s ease-in-out,color .3s ease-in-out} .arrow{width:16px;height:16px;color:var(--muted);transform:translateX(-2px);opacity:.72;transition:transform .3s ease-in-out,color .3s ease-in-out,opacity .3s ease-in-out} .doc a:hover .doc-title{color:var(--blue);background-size:100% 1px} .doc a:hover .arrow{color:var(--blue);transform:translateX(2px);opacity:1}
    .empty{grid-column:1/-1;padding:56px 24px;border:1px dashed var(--line2);border-radius:var(--radius);background:var(--white);text-align:center;color:var(--muted);font-size:14px} footer{background:var(--soft);border-top:1px solid var(--line);padding:28px 20px 40px;text-align:center;color:var(--muted);font-size:12.5px} footer a{color:var(--blue)}
    a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid rgba(0,102,204,.5);outline-offset:2px} #search:focus-visible{outline:none}
    @media(max-width:820px){.card.featured{grid-column:auto;padding:24px;border-radius:var(--radius)}} @media(max-width:640px){.topbar-inner,.wrap{width:min(100vw - 28px,1120px)} .desc{white-space:normal} .actions a{display:none} .grid{grid-template-columns:1fr} .kbd{display:none} .stats{flex-wrap:wrap;justify-content:center}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto} *,*::before,*::after{transition-duration:.001ms!important;animation-duration:.001ms!important} .card:hover{transform:none}}
  </style>
</head>
<body>
  <nav class="topbar" aria-label="主导航"><div class="topbar-inner"><a class="brand" href="./" aria-label="返回首页"><span class="mark">L</span><span class="brand-text"><b>liuys</b> <span>开发者文档</span></span></a><div class="actions"><a class="pill" href="#docs">浏览文档</a><button class="pill" id="copyHome" type="button" aria-label="复制本页地址"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>复制地址</button></div></div></nav>
  <header class="hero"><p class="eyebrow">Document Index</p><h1>开发者文档</h1><p class="desc">由 liuys-html-publisher 发布的 HTML 文档索引 · Cloudflare Pages 实时同步</p><div class="search" role="search"><div class="search-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg><input id="search" type="search" placeholder="搜索文档标题、日期或路径" autocomplete="off" aria-label="搜索文档"><button class="clear" id="clearSearch" type="button" aria-label="清空搜索"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg></button><span class="kbd" aria-hidden="true">⌘ K</span></div></div><div class="stats" aria-live="polite"><span>共 <b id="totalCount">0</b> 篇文档</span><span class="dot"></span><span><b id="dateCount">0</b> 个发布日</span><span class="dot"></span><span>最新 <b id="latestDate">—</b></span></div></header>
  <main class="section" id="docs"><div class="wrap"><div class="head"><h2>按发布日期</h2><span id="resultCount">0 / 0</span></div><div class="grid" id="grid"></div></div></main>
  <footer>由 <a href="https://github.com/coderSamuelLYS/liuysDocSite" target="_blank" rel="noopener">liuys-html-publisher</a> 自动维护 · Cloudflare Pages 同步</footer>
  <script>
    const PAGES = [
    { date: "2026-06-26", seq: "001", title: "大文件存储 OSS → COS 迁移方案", path: "/20260626/001/oss-to-cos-migration-plan.html" },
    { date: "2026-06-25", seq: "006", title: "Range 视频播放演示", path: "/20260625/006/index.html" },
    { date: "2026-06-25", seq: "005", title: "OSS → COS 迁移方案 Review 可视化报告", path: "/20260625/005/oss-cos-migration-review.html" },
    { date: "2026-06-25", seq: "004", title: "liuys index auto update smoke", path: "/20260625/004/index.html" },
    { date: "2026-06-25", seq: "003", title: "liuys Cloudflare Pages smoke", path: "/20260625/003/index.html" },
    { date: "2026-06-25", seq: "002", title: "fs-stone-error-log-governance-report", path: "/20260625/002/fs-stone-error-log-governance-report.html" },
    { date: "2026-06-25", seq: "001", title: "liuys HTML publisher report", path: "/20260625/001/index.html" },
    ];

    const normalizeUrl = (path) => path.endsWith('/index.html') ? path.slice(0, -10) : (path.endsWith('.html') ? path.slice(0, -5) : path);
    const formatPath = (path) => path.replace(/^\//, '');
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const prettyDate = (iso) => { const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); return m ? `${Number(m[2])} 月 ${Number(m[3])} 日` : iso; };
    const sortedPages = () => [...PAGES].sort((a,b) => a.date !== b.date ? b.date.localeCompare(a.date) : (a.seq !== b.seq ? Number(b.seq)-Number(a.seq) : a.title.localeCompare(b.title,'zh')));
    const matchPage = (p,q) => `${p.date} ${p.seq} ${p.title} ${p.path}`.toLowerCase().includes(q.toLowerCase());
    const byDate = (pages) => pages.reduce((m,p) => (m.has(p.date) || m.set(p.date, []), m.get(p.date).push(p), m), new Map());
    const icons = { cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15" rx="3"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/></svg>', arrow:'<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>' };
    const renderBento = (pages) => {
      const grid = document.getElementById('grid'); grid.innerHTML='';
      if (!pages.length) { grid.innerHTML='<div class="empty">没有匹配的文档</div>'; return; }
      const latest = sortedPages()[0]?.date;
      for (const [date, items] of byDate(pages)) {
        const card = document.createElement('article'); card.className = 'card' + (date === latest ? ' featured' : '');
        card.innerHTML = `<div class="card-head"><span class="icon">${icons.cal}</span><span class="title"><h3>${prettyDate(date)}</h3><span class="meta">${date} · ${items.length} 篇</span></span>${date===latest?'<span class="tag">最新</span>':''}</div><ul class="docs">${items.map(p=>`<li class="doc"><a href="${normalizeUrl(p.path)}" title="${esc(formatPath(p.path))}"><span class="seq">${esc(p.seq)}</span><span class="doc-title">${esc(p.title)}</span>${icons.arrow}</a></li>`).join('')}</ul>`;
        grid.append(card);
      }
    };
    const renderStats = (pages) => { const latest=sortedPages()[0]; document.getElementById('totalCount').textContent=PAGES.length; document.getElementById('dateCount').textContent=new Set(PAGES.map(p=>p.date)).size; document.getElementById('latestDate').textContent=latest?prettyDate(latest.date):'—'; document.getElementById('resultCount').textContent=`${pages.length} / ${PAGES.length}`; };
    const render = () => { const q=document.getElementById('search').value.trim(); const pages=sortedPages().filter(p=>!q||matchPage(p,q)); renderBento(pages); renderStats(pages); document.getElementById('clearSearch').classList.toggle('show', q.length>0); };
    const search = document.getElementById('search'); search.addEventListener('input', render);
    document.getElementById('clearSearch').addEventListener('click', () => { search.value=''; render(); search.focus(); });
    document.getElementById('copyHome').addEventListener('click', async () => { try { await navigator.clipboard.writeText(location.href); } catch(e) { window.prompt('复制地址', location.href); } });
    document.addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k') { e.preventDefault(); search.focus(); search.select(); } });
    render();
  </script>
</body>
</html>
