<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>liuys HTML Pages</title>
  <style>
    :root {
      --paper: #f5f7fb;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-soft: #dff7f3;
      --code: #eef2f7;
      --shadow: 0 18px 42px rgba(28, 39, 64, .09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(15,118,110,.08) 0 1px, transparent 1px 100%) 0 0 / 44px 44px,
        linear-gradient(180deg, rgba(15,118,110,.06), transparent 260px),
        var(--paper);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    header, main { width: min(1120px, calc(100vw - 40px)); margin: 0 auto; }
    header { padding: 44px 0 26px; }
    .kicker { color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin: 10px 0 10px; font-size: clamp(32px, 5vw, 56px); line-height: 1.02; letter-spacing: 0; }
    .summary { max-width: 760px; color: var(--muted); font-size: 16px; line-height: 1.7; margin: 0; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 24px 0 18px;
    }
    input[type="search"] {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 15px;
      background: var(--panel);
      color: var(--ink);
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,.14); }
    .count { color: var(--muted); font-size: 14px; white-space: nowrap; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 18px; align-items: start; padding-bottom: 48px; }
    .panel { background: rgba(255,255,255,.88); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    aside { position: sticky; top: 18px; padding: 16px; }
    aside h2, .content h2 { margin: 0 0 12px; font-size: 15px; }
    .tree { list-style: none; padding: 0; margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.8; }
    .tree ul { list-style: none; margin: 0 0 0 18px; padding: 0 0 0 12px; border-left: 1px solid var(--line); }
    .tree a { color: var(--ink); text-decoration: none; }
    .tree a:hover { color: var(--accent); text-decoration: underline; }
    .folder { color: var(--accent); font-weight: 700; }
    .content { padding: 18px; }
    .date-group { border-top: 1px solid var(--line); padding: 18px 0 2px; }
    .date-group:first-of-type { border-top: 0; padding-top: 0; }
    .date-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
    .date-head h3 { margin: 0; font-size: 20px; }
    .date-head span { color: var(--muted); font-size: 13px; }
    .doc-list { display: grid; gap: 10px; }
    .doc {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-decoration: none;
      color: var(--ink);
    }
    .doc:hover { border-color: rgba(15,118,110,.45); box-shadow: 0 10px 24px rgba(15,118,110,.08); }
    .badge { min-width: 42px; padding: 4px 8px; border-radius: 6px; text-align: center; background: var(--accent-soft); color: var(--accent); font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .doc-title { font-weight: 700; overflow-wrap: anywhere; }
    .doc-path { color: var(--muted); font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; margin-top: 3px; overflow-wrap: anywhere; }
    .arrow { color: var(--muted); font-size: 18px; }
    .empty { padding: 30px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; background: rgba(255,255,255,.66); }
    @media (max-width: 820px) {
      header, main { width: min(100vw - 24px, 1120px); }
      .toolbar, .layout { grid-template-columns: 1fr; }
      aside { position: static; }
      .doc { grid-template-columns: auto 1fr; }
      .arrow { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="kicker">liuys pages index</div>
    <h1>HTML 文档索引</h1>
    <p class="summary">这里按日期和序号展示通过 liuys-html-publisher 发布的 HTML 文档。每次发布都会写入一个新目录，并自动登记到这个索引页。</p>
    <div class="toolbar">
      <input id="search" type="search" placeholder="搜索标题、日期或路径" autocomplete="off">
      <div class="count" id="count"></div>
    </div>
  </header>
  <main class="layout">
    <aside class="panel">
      <h2>目录树</h2>
      <ul class="tree" id="tree"></ul>
    </aside>
    <section class="panel content">
      <h2>已发布文档</h2>
      <div id="docs"></div>
    </section>
  </main>
  <script>
    const PAGES = [
    { date: "2026-06-26", seq: "001", title: "大文件存储 OSS → COS 迁移方案", path: "/20260626/001/oss-to-cos-migration-plan.html" },
    { date: "2026-06-25", seq: "006", title: "Range 视频播放演示", path: "/20260625/006/index.html" },
    { date: "2026-06-25", seq: "005", title: "OSS → COS 迁移方案 Review 可视化报告", path: "/20260625/005/oss-cos-migration-review.html" },
    { date: "2026-06-25", seq: "004", title: "liuys index auto update smoke", path: "/20260625/004/index.html" },
    { date: "2026-06-25", seq: "003", title: "liuys Cloudflare Pages smoke", path: "/20260625/003/index.html" },
    { date: "2026-06-25", seq: "002", title: "fs-stone-error-log-governance-report", path: "/20260625/002/fs-stone-error-log-governance-report.html" },
    { date: "2026-06-25", seq: "001", title: "liuys HTML publisher report", path: "/20260625/001/index.html" },
    ];

    const normalizeUrl = (path) => {
      if (path.endsWith('/index.html')) return path.slice(0, -'index.html'.length);
      if (path.endsWith('.html')) return path.slice(0, -'.html'.length);
      return path;
    };

    const formatPath = (path) => path.replace(/^\//, '');

    const sortedPages = () => [...PAGES].sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      if (a.seq !== b.seq) return Number(b.seq) - Number(a.seq);
      return a.title.localeCompare(b.title);
    });

    const matchPage = (page, query) => {
      const haystack = `${page.date} ${page.seq} ${page.title} ${page.path}`.toLowerCase();
      return haystack.includes(query.toLowerCase());
    };

    const renderTree = (pages) => {
      const byDate = new Map();
      for (const page of pages) {
        if (!byDate.has(page.date)) byDate.set(page.date, new Map());
        const seqs = byDate.get(page.date);
        if (!seqs.has(page.seq)) seqs.set(page.seq, []);
        seqs.get(page.seq).push(page);
      }
      const tree = document.getElementById('tree');
      tree.innerHTML = '';
      for (const [date, seqs] of byDate) {
        const dateLi = document.createElement('li');
        dateLi.innerHTML = `<span class="folder">${date.replaceAll('-', '')}/</span>`;
        const seqUl = document.createElement('ul');
        for (const [seq, docs] of seqs) {
          const seqLi = document.createElement('li');
          seqLi.innerHTML = `<span class="folder">${seq}/</span>`;
          const docUl = document.createElement('ul');
          for (const doc of docs) {
            const docLi = document.createElement('li');
            const a = document.createElement('a');
            a.href = normalizeUrl(doc.path);
            a.title = formatPath(doc.path);
            a.textContent = doc.title;
            docLi.append(a);
            docUl.append(docLi);
          }
          seqLi.append(docUl);
          seqUl.append(seqLi);
        }
        dateLi.append(seqUl);
        tree.append(dateLi);
      }
    };

    const renderDocs = (pages) => {
      const docs = document.getElementById('docs');
      docs.innerHTML = '';
      if (!pages.length) {
        docs.innerHTML = '<div class="empty">没有匹配的文档</div>';
        return;
      }
      const groups = new Map();
      for (const page of pages) {
        if (!groups.has(page.date)) groups.set(page.date, []);
        groups.get(page.date).push(page);
      }
      for (const [date, items] of groups) {
        const group = document.createElement('section');
        group.className = 'date-group';
        group.innerHTML = `<div class="date-head"><h3>${date}</h3><span>${items.length} 个文档</span></div>`;
        const list = document.createElement('div');
        list.className = 'doc-list';
        for (const page of items) {
          const link = document.createElement('a');
          link.className = 'doc';
          link.href = normalizeUrl(page.path);
          link.innerHTML = `<span class="badge">${page.seq}</span><span><span class="doc-title"></span><span class="doc-path"></span></span><span class="arrow">→</span>`;
          link.querySelector('.doc-title').textContent = page.title;
          link.querySelector('.doc-path').textContent = formatPath(page.path);
          list.append(link);
        }
        group.append(list);
        docs.append(group);
      }
    };

    const render = () => {
      const query = document.getElementById('search').value.trim();
      const pages = sortedPages().filter((page) => !query || matchPage(page, query));
      renderTree(pages);
      renderDocs(pages);
      document.getElementById('count').textContent = `${pages.length} / ${PAGES.length} 个文档`;
    };

    document.getElementById('search').addEventListener('input', render);
    render();
  </script>
</body>
</html>
