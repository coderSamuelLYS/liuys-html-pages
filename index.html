<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>技术卷帙 · liuys</title>
  <meta name="description" content="liuys 的 HTML 文档卷帙，按归期编次，可检索标题、序号与路径。">
  <style>
    :root {
      color-scheme: light;
      --paper:#F6F3EC; --surface:#FBF8F1; --ink:#1A1714; --muted:#6B6258;
      --vermilion:#C8412B; --vermilion-soft:rgba(200,65,43,.08);
      --rule:#D9D2C4; --rule-soft:#E7E1D4;
      --display:"Songti SC","Noto Serif CJK SC","STSong","SimSun",serif;
      --serif:"Songti SC","Noto Serif CJK SC","STSong","Georgia",serif;
      --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
      --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
    body{margin:0;color:var(--ink);font-family:var(--sans);background:var(--paper);
      -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}
    a{color:inherit;text-decoration:none}
    ::selection{background:rgba(200,65,43,.16)}
    .wrap{width:min(820px,calc(100vw - 48px));margin:auto}

    /* ---------- topbar ---------- */
    .topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--rule);
      background:rgba(246,243,236,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
    .topbar-inner{height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:baseline;gap:10px;min-width:0}
    .brand b{font-family:var(--serif);font-size:17px;font-weight:700;letter-spacing:.02em}
    .brand em{font-style:normal;color:var(--muted);font-size:12px;letter-spacing:.18em}
    .actions{display:flex;gap:18px;align-items:center}
    .act{font-size:13px;color:var(--muted);cursor:pointer;background:none;border:0;padding:0;
      font-family:var(--sans);transition:color .2s ease-in-out;display:inline-flex;align-items:center;gap:5px}
    .act:hover{color:var(--ink)}
    .act svg{width:13px;height:13px}

    /* ---------- masthead ---------- */
    .masthead{padding:clamp(40px,7vh,72px) 0 8px}
    .kicker{display:flex;align-items:center;gap:14px;color:var(--muted);
      font-family:var(--serif);font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
    .kicker::before,.kicker::after{content:"";flex:1;height:1px;background:var(--rule)}
    .kicker span{white-space:nowrap}
    h1{margin:0;font-family:var(--display);font-weight:700;font-size:clamp(56px,11vw,104px);
      line-height:.96;letter-spacing:.04em;text-align:center;color:var(--ink)}
    h1 .en{display:block;margin-top:10px;font-family:var(--serif);font-style:italic;font-weight:400;
      font-size:clamp(14px,2vw,18px);letter-spacing:.12em;color:var(--muted);text-align:center}
    .double-rule{margin:26px 0 18px;border-top:2px solid var(--ink);border-bottom:1px solid var(--ink);height:5px}
    .colophon{display:flex;flex-wrap:wrap;justify-content:center;gap:0;color:var(--muted);
      font-family:var(--serif);font-size:13px;letter-spacing:.04em}
    .colophon span{padding:0 14px;position:relative}
    .colophon span:not(:last-child)::after{content:"·";position:absolute;right:-3px;color:var(--rule)}
    .colophon b{color:var(--ink);font-weight:600}

    .lede{margin:22px auto 0;max-width:46ch;text-align:center;color:var(--muted);font-size:15px;line-height:1.7}

    /* ---------- search ---------- */
    .search{margin:28px auto 0;max-width:520px}
    .search-box{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--rule);
      transition:border-color .25s ease-in-out}
    .search-box:focus-within{border-color:var(--ink)}
    .search-box svg{flex:none;color:var(--muted)}
    #search{flex:1;min-width:0;border:0;outline:0;background:transparent;color:var(--ink);
      font:15px/1.4 var(--serif)}
    #search::placeholder{color:var(--muted);font-style:italic}
    .clear{display:none;width:22px;height:22px;border:0;border-radius:50%;background:var(--vermilion-soft);color:var(--vermilion);cursor:pointer}
    .clear.show{display:inline-grid;place-items:center}
    .kbd{font:11px var(--mono);color:var(--muted);border:1px solid var(--rule);border-radius:3px;padding:1px 6px;background:var(--surface)}

    /* ---------- contents ---------- */
    .contents{padding:clamp(20px,3vh,34px) 0 clamp(48px,7vh,72px)}
    .contents-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
      margin-bottom:26px;padding-bottom:10px;border-bottom:1px solid var(--ink)}
    .contents-head h2{margin:0;font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:.06em}
    .contents-head h2 em{font-family:var(--serif);font-style:italic;font-weight:400;font-size:13px;color:var(--muted);margin-left:8px;letter-spacing:.08em}
    .contents-head span{color:var(--muted);font-family:var(--serif);font-size:13px}

    .issue{margin-bottom:30px;position:relative}
    .issue-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .issue-date{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.03em;color:var(--ink)}
    .issue-date em{font-family:var(--serif);font-style:italic;font-weight:400;font-size:12px;color:var(--muted);margin-left:8px}
    .issue-rule{flex:1;height:1px;background:var(--rule)}
    .issue-cnt{font-family:var(--serif);font-size:12px;color:var(--muted);letter-spacing:.04em}

    /* vermilion seal — only on the latest issue */
    .seal{flex:none;width:50px;height:50px;display:grid;place-items:center;text-align:center;
      border:2px solid var(--vermilion);color:var(--vermilion);background:var(--vermilion-soft);
      border-radius:5px;transform:rotate(-7deg);font-family:var(--display);font-weight:700;
      font-size:12px;line-height:1.1;letter-spacing:.04em;
      box-shadow:inset 0 0 0 3px var(--paper);position:relative}
    .seal::before{content:"";position:absolute;inset:-4px;border:1px solid var(--vermilion);opacity:.3;border-radius:7px}
    .seal b{display:block}

    /* TOC row with leader dots */
    .toc{list-style:none;margin:0;padding:0}
    .toc a{display:flex;align-items:baseline;gap:.6em;padding:11px 0;border-bottom:1px solid var(--rule-soft);
      transition:padding-left .2s ease-in-out}
    .toc a:hover{padding-left:6px}
    .toc .seq{flex:none;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--vermilion);
      min-width:2.6em;letter-spacing:.02em}
    .toc .seq s{text-decoration:none}
    .toc .title{flex:none;max-width:62%;color:var(--ink);font-size:14.5px;font-weight:500;
      background-image:linear-gradient(currentColor,currentColor);background-size:0 1px;background-position:0 100%;background-repeat:no-repeat;
      transition:background-size .25s ease-in-out,color .25s ease-in-out}
    .toc .leader{flex:1;border-bottom:1px dotted var(--rule);transform:translateY(-.32em);min-width:18px}
    .toc .path{flex:none;max-width:30%;font-family:var(--mono);font-size:11.5px;color:var(--muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s ease-in-out}
    .toc .ext{flex:none;width:13px;height:13px;color:var(--muted);opacity:.5;transform:translateY(1px);
      transition:opacity .2s ease-in-out,color .2s ease-in-out}
    .toc a:hover .title{color:var(--vermilion);background-size:100% 1px}
    .toc a:hover .path{color:var(--ink)}
    .toc a:hover .ext{opacity:1;color:var(--vermilion)}

    .empty{padding:56px 24px;border:1px solid var(--rule);background:var(--surface);text-align:center;color:var(--muted)}
    .empty b{display:block;margin-bottom:8px;font-family:var(--display);font-size:16px;color:var(--ink)}
    .empty span{font-size:13px}

    /* ---------- colophon footer ---------- */
    footer{border-top:1px solid var(--rule);padding:30px 20px 42px;text-align:center;color:var(--muted);font-size:12.5px}
    footer .orn{display:block;color:var(--rule);font-size:14px;letter-spacing:1em;margin-bottom:14px}
    footer a{color:var(--vermilion);font-family:var(--serif)}

    a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid rgba(200,65,43,.5);outline-offset:3px}
    #search:focus-visible{outline:none}

    @media(max-width:640px){
      .wrap{width:min(100vw - 32px,820px)}
      .actions .act[data-hide-sm]{display:none}
      .kbd{display:none}
      .toc .title{max-width:54%}
      .toc .path{max-width:34%}
      .toc .seq{min-width:2.2em}
      .colophon span{padding:0 10px}
    }
    @media(prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      *,*::before,*::after{transition-duration:.001ms!important;animation-duration:.001ms!important}
    }
  </style>
</head>
<body>
  <nav class="topbar" aria-label="主导航"><div class="wrap topbar-inner">
    <a class="brand" href="./" aria-label="返回首页"><b>liuys</b><em>技术卷帙</em></a>
    <div class="actions">
      <a class="act" href="#contents">目录</a>
      <button class="act" id="copyHome" type="button" aria-label="复制本页地址"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>复制地址</button>
    </div>
  </div></nav>

  <header class="masthead"><div class="wrap">
    <p class="kicker"><span>Technical Volumes</span></p>
    <h1>技术卷帙<span class="en">Index &amp; Contents</span></h1>
    <div class="double-rule"></div>
    <div class="colophon">
      <span>编者 <b>liuys</b></span>
      <span>共 <b id="totalCount">0</b> 帙</span>
      <span><b id="dateCount">0</b> 个归期</span>
      <span>近录 <b id="latestDate">—</b></span>
    </div>
    <p class="lede">按归期编次，收录 liuys 所著 HTML 文卷。于目录中检标题、序号或路径，点选条目即另开一页展卷。</p>
    <div class="search" role="search"><div class="search-box">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input id="search" type="search" placeholder="检索标题、序号或路径……" autocomplete="off" aria-label="检索文档">
      <button class="clear" id="clearSearch" type="button" aria-label="清空检索"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
      <span class="kbd" aria-hidden="true">⌘ K</span>
    </div></div>
  </div></header>

  <main class="contents" id="contents"><div class="wrap">
    <div class="contents-head"><h2>目录<em>Contents</em></h2><span id="resultCount">0 / 0</span></div>    <div id="list"></div>
  </div></main>

  <footer><div class="wrap">
    <span class="orn">— ❦ —</span>
    本目录由 <a href="https://github.com/coderSamuelLYS/liuysDocSite" target="_blank" rel="noopener">liuys-html-publisher</a> 自动编录
  </div></footer>

  <script>
    const PAGES = [
    { date: "2026-06-26", seq: "001", title: "大文件存储 OSS → COS 迁移方案", path: "/20260626/001/oss-to-cos-migration-plan.html" },
    { date: "2026-06-25", seq: "006", title: "Range 视频播放演示", path: "/20260625/006/index.html" },
    { date: "2026-06-25", seq: "005", title: "OSS → COS 迁移方案 Review 可视化报告", path: "/20260625/005/oss-cos-migration-review.html" },
    { date: "2026-06-25", seq: "004", title: "liuys index auto update smoke", path: "/20260625/004/index.html" },
    { date: "2026-06-25", seq: "003", title: "liuys Cloudflare Pages smoke", path: "/20260625/003/index.html" },
    { date: "2026-06-25", seq: "002", title: "fs-stone-error-log-governance-report", path: "/20260625/002/fs-stone-error-log-governance-report.html" },
    { date: "2026-06-25", seq: "001", title: "liuys HTML publisher report", path: "/20260625/001/index.html" },
    ];

    const normalizeUrl = (path) => path.endsWith('/index.html') ? path.slice(0, -10) : (path.endsWith('.html') ? path.slice(0, -5) : path);
    const formatPath = (path) => path.replace(/^\//, '').replace(/\.html$/,'');
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fullDate = (iso) => { const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); return m ? `${m[1]}.${m[2]}.${m[3]}` : iso; };
    const seqNo = (seq) => Number(seq);
    const sortedPages = () => [...PAGES].sort((a,b) => a.date !== b.date ? b.date.localeCompare(a.date) : (a.seq !== b.seq ? Number(b.seq)-Number(a.seq) : a.title.localeCompare(b.title,'zh')));
    const matchPage = (p,q) => `${p.date} ${p.seq} ${p.title} ${p.path}`.toLowerCase().includes(q.toLowerCase());
    const byDate = (pages) => pages.reduce((m,p) => (m.has(p.date) || m.set(p.date, []), m.get(p.date).push(p), m), new Map());
    const latestDate = () => sortedPages()[0]?.date;

    const extSvg = '<svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 5h5v5M19 5l-9 9M18 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h4"/></svg>';

    const renderList = (pages) => {
      const list = document.getElementById('list'); list.innerHTML='';
      if (!pages.length) { list.innerHTML='<div class="empty"><b>未检得相关文档</b><span>换个标题、序号或路径片段再试。</span></div>'; return; }
      const latest = latestDate();
      let issueNo = 0;
      for (const [date, items] of byDate(pages)) {
        issueNo++;
        const isLatest = date === latest;
        const issue = document.createElement('section'); issue.className='issue';
        issue.innerHTML = `<div class="issue-head">
            ${isLatest ? '<div class="seal" aria-label="近录"><b>近</b><b>录</b></div>' : ''}
            <span class="issue-date">${esc(fullDate(date))}<em>${items.length} 卷</em></span>
            <span class="issue-rule"></span>
            <span class="issue-cnt">第 ${issueNo} 期</span>
          </div>
          <ul class="toc">${items.map(p=>`<li><a href="${normalizeUrl(p.path)}" target="_blank" rel="noopener" title="${esc(formatPath(p.path))}">
              <span class="seq">№ ${seqNo(p.seq)}</span>
              <span class="title">${esc(p.title)}</span>
              <span class="leader"></span>
              <span class="path">${esc(formatPath(p.path))}</span>
              ${extSvg}
            </a></li>`).join('')}</ul>`;
        list.append(issue);
      }
    };

    const renderStats = (pages) => {
      const latest = sortedPages()[0];
      document.getElementById('totalCount').textContent = PAGES.length;
      document.getElementById('dateCount').textContent = new Set(PAGES.map(p=>p.date)).size;
      document.getElementById('latestDate').textContent = latest ? fullDate(latest.date) : '—';
      document.getElementById('resultCount').textContent = `${pages.length} / ${PAGES.length}`;
    };

    const render = () => {
      const q = document.getElementById('search').value.trim();
      const pages = sortedPages().filter(p => !q || matchPage(p, q));
      renderList(pages); renderStats(pages);
      document.getElementById('clearSearch').classList.toggle('show', q.length > 0);
    };

    const search = document.getElementById('search');
    search.addEventListener('input', render);
    document.getElementById('clearSearch').addEventListener('click', () => { search.value=''; render(); search.focus(); });
    document.getElementById('copyHome').addEventListener('click', async () => { try { await navigator.clipboard.writeText(location.href); } catch(e) { window.prompt('复制地址', location.href); } });
    document.addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k') { e.preventDefault(); search.focus(); search.select(); } });
    render();
  </script>
</body>
</html>
